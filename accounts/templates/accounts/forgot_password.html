<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Fabric Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body>
    <div class="login-container">
        <div class="login-card glass">
            <div class="text-center mb-4">
                <div class="logo-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h2 class="fw-bold text-white">Reset Password</h2>
                <p class="text-light-50">Enter your username and new password</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label text-light">Username</label>
                    {{ form.username }}
                </div>
                <div class="mb-3">
                    <label for="id_new_password" class="form-label text-light">New Password</label>
                    {{ form.new_password }}
                </div>
                <div class="mb-3">
                    <label for="id_confirm_password" class="form-label text-light">Confirm Password</label>
                    {{ form.confirm_password }}
                </div>
                <button type="submit" class="btn btn-login w-100 fw-bold">
                    <i class="fas fa-sync-alt me-2"></i> Reset Password
                </button>
            </form>
            <p class="text-center text-light-50 mt-3 small">
                <a href="{% url 'accounts:login' %}" class="text-decoration-none text-light-50 hover-glow">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </p>
            <p class="text-center text-light-50 mt-3 small">&copy; 2025 Fabric Management System</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
