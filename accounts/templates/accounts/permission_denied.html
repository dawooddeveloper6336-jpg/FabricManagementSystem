{% extends 'dashboard/base.html' %}
{% load static %}

{% block title %}Access Denied | Fabric Management{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card glass text-center p-5">
                <div class="card-body">
                    <i class="bi bi-shield-lock fs-1 text-danger mb-3"></i>
                    <h3 class="text-white">Access Denied</h3>
                    <p class="text-light-50">
                        You don't have permission to access this page.
                        <br>Please contact your Administrator.
                    </p>
                    <a href="{% url 'dashboard:dashboard' %}" class="btn btn-login mt-3">
                        <i class="bi bi-arrow-left me-1"></i> Go to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
