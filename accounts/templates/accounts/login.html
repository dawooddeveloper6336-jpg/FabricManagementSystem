<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Fabric Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body>
    <div class="login-container">
        <div class="login-card glass">
            <div class="text-center mb-4">
                <div class="logo-icon">
                    <i class="fas fa-tshirt"></i>
                </div>
                <h2 class="fw-bold text-white">Fabric Management</h2>
                <p class="text-light-50">Sign in to your account</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label text-light">Username</label>
                    {{ form.username }}
                </div>
                <div class="mb-3 position-relative">
                    <label for="id_password" class="form-label text-light">Password</label>
                    <div class="input-group">
                        {{ form.password }}
                        <button class="btn btn-outline-light border-0" type="button" id="togglePassword">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        {{ form.remember_me }}
                        <label class="form-check-label text-light-50" for="id_remember_me">Remember Me</label>
                    </div>
                    <a href="{% url 'accounts:forgot_password' %}" class="text-decoration-none text-light-50 hover-glow">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-login w-100 fw-bold">
                    <i class="fas fa-sign-in-alt me-2"></i> Login
                </button>
            </form>
            <p class="text-center text-light-50 mt-3 small">&copy; 2025 Fabric Management System</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('togglePassword');
            const field = document.getElementById('id_password');
            const icon = document.getElementById('toggleIcon');
            toggle.addEventListener('click', function() {
                const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
                field.setAttribute('type', type);
                icon.classList.toggle('fa-eye');
                icon.classList.toggle('fa-eye-slash');
            });
        });
    </script>
</body>
</html>
